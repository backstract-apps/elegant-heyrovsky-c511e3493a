---
apiVersion: v1
kind: Secret
metadata:
  name: elegant-heyrovsky-c511e3493a-bst-token
  namespace: apps-release
  labels:
    app: elegant-heyrovsky-c511e3493a
    managed-by: backstract
  annotations:
    backstract.io/token-scope: "storage.*,cache.*"
type: Opaque
stringData:
  token: "PLACEHOLDER_BST_TOKEN_REPLACE_AT_RUNTIME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elegant-heyrovsky-c511e3493a-depl
  namespace: apps-release
  labels:
    app: elegant-heyrovsky-c511e3493a
    release: prometheus # Added label for PodMonitor discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elegant-heyrovsky-c511e3493a
      release: prometheus # Added label for PodMonitor discovery
  template:
    metadata:
      labels:
        app: elegant-heyrovsky-c511e3493a
        release: prometheus # Added label for PodMonitor discovery
    spec:
      serviceAccountName: alloy-service-account
      volumes:
      - name: alloy-config
        configMap:
          name: alloy-configmap
          items:
          - key: alloy.river
            path: config.alloy

      - name: podinfo
        downwardAPI:
          items:
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
          - path: "annotations"
            fieldRef:
              fieldPath: metadata.annotations
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "user"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodepool
                    operator: In
                    values: ["spot-users"]
      containers:
      - name: elegant-heyrovsky-c511e3493a
        image: 216084506783.dkr.ecr.ap-south-1.amazonaws.com/backstract_apps:elegant-heyrovsky-c511e3493a
        imagePullPolicy: Always
        env:
        - name: BACKSTRACT_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: elegant-heyrovsky-c511e3493a-bst-token
              key: token
        - name: BACKSTRACT_PLATFORM_URL
          value: "https://api-release.beemerbenzbentley.site/sigma"
        envFrom:
        - configMapRef:
            name: env-configmap-coll-8219f64785d840be8e64ac00503d28c6-deployment-86d5b29f-a46d-4d20-a6d6-e7b7dd544078
        ports:
        - containerPort: 7070
          name: http # Optional for HTTP traffic
        - containerPort: 7070 #same as the deployed code
          name: metrics # Added port for metrics scraping
        resources:
          requests:
            memory: "210Mi"
            cpu: "50m"
          limits:
            memory: "500Mi"
            cpu: "100m"
#        readinessProbe:
#          httpGet:
#            path: /health  # Change this to your app's actual health check path
#            port: 7070       # The port your app listens on
#          initialDelaySeconds: 5  # Give it 5s before checking
#          periodSeconds: 5        # Check every 5s
#          successThreshold: 1
#          failureThreshold: 3

      - name: alloy-sidecar
        image: grafana/alloy:latest
        args:
        - "run"
        - "/etc/alloy/config.alloy"
        - "--server.http.listen-addr=0.0.0.0:12345"
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        - name: alloy-http
          containerPort: 12345
          protocol: TCP
        volumeMounts:
        - name: alloy-config
          mountPath: /etc/alloy
        - name: podinfo
          mountPath: /etc/podinfo
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "300m"
